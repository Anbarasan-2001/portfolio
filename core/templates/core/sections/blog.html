{# ===== Blog (recent posts) ===== #}
{% if posts %}
<section id="blog" data-scroll-section class="py-24 sm:py-32 bg-slate-50 dark:bg-white/[0.02]">
    <div class="max-w-6xl mx-auto px-5 sm:px-8">
        {% include "core/partials/section_heading.html" with heading="From the Blog" sub="Thoughts on development, design and motion." %}

        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6" data-stagger>
            {% for post in posts %}
                {% include "blog/_card.html" with post=post %}
            {% endfor %}
        </div>

        <div class="text-center mt-12" data-anim="fade-up">
            <a href="{% url 'blog:list' %}"
               class="inline-flex px-7 py-3 rounded-full border border-slate-300 dark:border-white/20
                      font-medium hover:border-accent hover:text-accent transition-colors">
                View All Posts
            </a>
        </div>
    </div>
</section>
{% endif %}

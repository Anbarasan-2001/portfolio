{# Sidebar link. Params: url, label, match (path prefix), exact (bool), badge (int) #}
<a href="{% url url %}"
   class="flex items-center justify-between px-3 py-2 rounded-lg transition-colors
          {% if exact and request.path == match or not exact and match in request.path %}bg-accent/10 text-accent font-medium{% else %}text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-white/5{% endif %}">
    <span>{{ label }}</span>
    {% if badge %}
    <span class="ml-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-accent text-white">{{ badge }}</span>
    {% endif %}
</a>

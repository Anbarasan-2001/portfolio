{% extends "dashboard_base.html" %}
{% block title %}Confirm delete{% endblock %}
{% block page_heading %}Confirm delete{% endblock %}

{% block content %}
<div class="max-w-lg rounded-2xl bg-white dark:bg-[#0e1428] border border-slate-200 dark:border-white/10 p-8">
    <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Are you sure?</h2>
    <p class="mt-2 text-slate-500">
        You're about to permanently delete
        <span class="font-medium text-slate-700 dark:text-slate-200">“{{ object }}”</span>.
        This action cannot be undone.
    </p>
    <form method="post" class="mt-6 flex items-center gap-3">
        {% csrf_token %}
        <button type="submit" class="px-6 py-2.5 rounded-lg bg-red-500 text-white font-medium hover:bg-red-600">
            Yes, delete
        </button>
        <a href="javascript:history.back()" class="px-6 py-2.5 rounded-lg border border-slate-200 dark:border-white/10
                  text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-white/5">Cancel</a>
    </form>
</div>
{% endblock %}

{% if is_paginated %}
<nav class="flex justify-center items-center gap-2 mt-6 text-sm">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}"
       class="px-3 py-1.5 rounded-lg border border-slate-200 dark:border-white/10 hover:border-accent hover:text-accent">Prev</a>
    {% endif %}
    <span class="px-3 py-1.5 text-slate-500">Page {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}"
       class="px-3 py-1.5 rounded-lg border border-slate-200 dark:border-white/10 hover:border-accent hover:text-accent">Next</a>
    {% endif %}
</nav>
{% endif %}

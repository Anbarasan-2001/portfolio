{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · Dashboard</title>
    <link rel="icon" type="image/png" href="{% static 'css/image/1.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { accent: '#6366f1' } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="min-h-screen bg-[#0b1020] text-slate-200 flex items-center justify-center px-5">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white">Welcome back</h1>
            <p class="text-slate-400 mt-1">Sign in to manage your portfolio</p>
        </div>

        <form method="post" class="bg-white/5 border border-white/10 rounded-2xl p-8 space-y-5">
            {% csrf_token %}

            {% if form.non_field_errors %}
            <div class="rounded-lg bg-red-500/20 border border-red-500/40 text-red-300 text-sm px-4 py-3">
                {{ form.non_field_errors|join:" " }}
            </div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium mb-1.5" for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required autofocus
                       class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3
                              focus:border-accent focus:ring-2 focus:ring-accent/30 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1.5" for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required
                       class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3
                              focus:border-accent focus:ring-2 focus:ring-accent/30 outline-none">
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <button type="submit"
                    class="w-full py-3 rounded-xl bg-accent text-white font-medium
                           hover:bg-accent/90 transition-colors">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-6">
            <a href="{% url 'website:home' %}" class="hover:text-accent">← Back to website</a>
        </p>
    </div>
</body>
</html>

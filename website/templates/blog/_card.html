{# Reusable blog post card. Expects `post` in context. #}
<article class="group rounded-2xl overflow-hidden bg-white dark:bg-white/5 border
                border-slate-100 dark:border-white/10 shadow-sm hover:shadow-xl transition-shadow">
    <a href="{{ post.get_absolute_url }}" class="block">
        <div class="relative aspect-[16/9] overflow-hidden bg-slate-100 dark:bg-white/5">
            {% if post.featured_image %}
            <img src="{{ post.featured_image.url }}" alt="{{ post.title }}" loading="lazy"
                 class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
            {% endif %}
        </div>
        <div class="p-5">
            <p class="text-xs text-slate-400">
                {{ post.published_at|date:"M j, Y"|default:"" }}
            </p>
            <h3 class="mt-1.5 font-display text-lg font-semibold text-slate-900 dark:text-white
                       group-hover:text-accent transition-colors line-clamp-2">
                {{ post.title }}
            </h3>
            <p class="mt-2 text-sm text-slate-500 dark:text-slate-400 line-clamp-3">
                {{ post.excerpt }}
            </p>
            <span class="inline-flex items-center gap-1 mt-4 text-sm font-medium text-accent">
                Read more →
            </span>
        </div>
    </a>
</article>
